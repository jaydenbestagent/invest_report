                    }

                    let tickerTag = f.ticker !== 'Unknown' ? `<span class="tag" style="${getColorStyle(f.ticker)}">#${f.ticker}</span>` : '';
                    let skillTag = f.skill !== 'Unknown' ? `<span class="tag" style="${getColorStyle(f.skill)}">@${f.skill}</span>` : '';
                    let langTag = `<span class="tag-lang">🌐 ${f.lang}</span>`;

                    html += `
                        <li class="file-card">
                            <a href="${f.href}" class="file-title">${icon} ${f.name}</a>
                            ${mediaHtml}
                            <div class="tags">
                                ${langTag}
                                <span class="tag tag-date">🕒 ${f.date}</span>
                                ${tickerTag}
                                ${skillTag}
                            </div>
                        </li>`;
                });
                html += '</ul>';
                container.innerHTML = html;
            } else {
                const groups = {};
                filtered.forEach(f => {
                    if (!groups[f.folder]) groups[f.folder] = [];
                    groups[f.folder].push(f);
                });

                Object.keys(groups).sort().forEach(folder => {
                    let html = `<div class="folder-group">📁 ${folder}</div><ul class="file-list">`;
                    groups[folder].forEach(f => {
                        let icon = f.ext === '.md' ? '📄' : '🖼️';
                        let langTag = `<span class="tag-lang" style="margin-right: 6px;">🌐 ${f.lang}</span>`;
                        html += `
                            <li class="file-card" style="margin-left: 15px; padding: 8px;">
                                <div>${langTag}<a href="${f.href}" class="file-title">${icon} ${f.name}</a></div>
                            </li>`;
                    });
                    html += '</ul>';
                    container.innerHTML += html;
                });
            }
        }

        document.getElementById('searchInput').addEventListener('input', render);
        document.getElementById('langFilter').addEventListener('change', render);
        document.getElementById('skillFilter').addEventListener('change', render);
        document.getElementById('tickerFilter').addEventListener('change', render);
        document.getElementById('sortBy').addEventListener('change', render);
        document.getElementById('viewToggle').addEventListener('click', (e) => {
            viewMode = viewMode === 'flat' ? 'tree' : 'flat';
            e.target.innerText = `Toggle View: ${viewMode === 'flat' ? 'Flat' : 'Tree'}`;
            render();
        });

        render();
    </script>
</body>
</html>
