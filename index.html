md", "folder": "us/us_macro/2026-02-24/zh"}];
        let viewMode = 'flat';
        
        const skills = [...new Set(files.map(f => f.skill).filter(s => s !== "Unknown"))].sort();
        const tickers = [...new Set(files.map(f => f.ticker).filter(t => t !== "Unknown"))].sort();
        
        skills.forEach(s => document.getElementById('skillFilter').innerHTML += `<option value="${s}">${s}</option>`);
        tickers.forEach(t => document.getElementById('tickerFilter').innerHTML += `<option value="${t}">${t}</option>`);

        function render() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const skillF = document.getElementById('skillFilter').value;
            const tickerF = document.getElementById('tickerFilter').value;
            const sort = document.getElementById('sortBy').value;

            let filtered = files.filter(f => {
                const matchSearch = f.path.toLowerCase().includes(search);
                const matchSkill = skillF === "" || f.skill === skillF;
                const matchTicker = tickerF === "" || f.ticker === tickerF;
                return matchSearch && matchSkill && matchTicker;
            });

            filtered.sort((a, b) => {
                if (sort === 'date_desc') return b.date.localeCompare(a.date);
                if (sort === 'date_asc') return a.date.localeCompare(b.date);
                if (sort === 'ticker') return a.ticker.localeCompare(b.ticker) || b.date.localeCompare(a.date);
                return 0;
            });

            const container = document.getElementById('contentArea');
            container.innerHTML = '';

            if (filtered.length === 0) {
                container.innerHTML = '<p>No reports found matching your criteria.</p>';
                return;
            }

            if (viewMode === 'flat') {
                let html = '<ul class="file-list">';
                filtered.forEach(f => {
                    let icon = f.ext === '.md' ? '📄' : '🖼️';
                    html += `
                        <li class="file-card">
                            <a href="${f.href}">${icon} ${f.name}</a>
                            <div class="tags">
                                <span class="tag">${f.date}</span>
                                ${f.ticker !== 'Unknown' ? `<span class="tag">#${f.ticker}</span>` : ''}
                                ${f.skill !== 'Unknown' ? `<span class="tag">@${f.skill}</span>` : ''}
                            </div>
                        </li>`;
                });
                html += '</ul>';
                container.innerHTML = html;
            } else {
                const groups = {};
                filtered.forEach(f => {
                    if (!groups[f.folder]) groups[f.folder] = [];
                    groups[f.folder].push(f);
                });

                Object.keys(groups).sort().forEach(folder => {
                    let html = `<div class="folder-group">📁 ${folder}</div><ul class="file-list">`;
                    groups[folder].forEach(f => {
                        let icon = f.ext === '.md' ? '📄' : '🖼️';
                        html += `
                            <li class="file-card" style="margin-left: 15px; padding: 8px;">
                                <a href="${f.href}">${icon} ${f.name}</a>
                            </li>`;
                    });
                    html += '</ul>';
                    container.innerHTML += html;
                });
            }
        }

        document.getElementById('searchInput').addEventListener('input', render);
        document.getElementById('skillFilter').addEventListener('change', render);
        document.getElementById('tickerFilter').addEventListener('change', render);
        document.getElementById('sortBy').addEventListener('change', render);
        document.getElementById('viewToggle').addEventListener('click', (e) => {
            viewMode = viewMode === 'flat' ? 'tree' : 'flat';
            e.target.innerText = `Toggle View: ${viewMode === 'flat' ? 'Flat' : 'Tree'}`;
            render();
        });

        render();
    </script>
